title = "Jonathan Griffiths"
baseURL = "https://jonathangriffiths.github.io"
disableKinds = ["taxonomy", "term"]
enableEmoji = true
math = false          # enable KaTeX (https://katex.org/) globally

[services]
  [services.googleAnalytics]
    id = ""  # add your tracking id

[params]
  author = "Jonathan Griffiths"
  description = "Computational scientist working at the intersection of biology, functional genomics, human genetics, and machine learning."
  favicon = "favicon.ico"  # path to a .ico to use as favicon
  logo = ""  # url or path to a logo to put in the header
  [params.footer]
    text = "By Jonathan Griffiths"
    url = "https://github.com/jonathangriffiths"
  [params.style]  # appearance options (can be omitted)
    fontFamily = "Inconsolata"
    fontSize = "14pt"
    pageWidth = "750px"
    avatarSize = "90px"
    colorBlack = "#222222"
    colorRed = "#dc3545"
  [[params.socialIcons]]
    icon = "ai ai-google-scholar"
    title = "Google Scholar"
    url = "https://scholar.google.co.uk/citations?user=ncNpXL4AAAAJ"
  [[params.socialIcons]]
    icon = "fab fa-github"
    title = "GitHub"
    url = "https://github.com/jonathangriffiths"
  [[params.socialIcons]]
    icon = "fab fa-linkedin"
    title = "LinkedIn"
    url = "https://www.linkedin.com/in/jonathan-griffiths-92b53615a/"

[permalinks]
  "/" = "/:filename"

[menu]
  [[menu.main]]
    name = "About"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "Publications"
    url = "/publications"
    weight = 2
  [[menu.main]]
    name = "Contact"
    url = "/contact"
    weight = 3

[markup.goldmark.renderer]
  unsafe = true  # allow raw HTML in markdown files
